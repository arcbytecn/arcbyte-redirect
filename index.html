<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>正在跳转...</title>
</head>
<body>
    <p>正在为您跳转，请稍候...</p>
    <p>如果未自动跳转，请 <a id="manualLink" href="#">点击这里</a>。</p>

    <script>
        // 1. 获取 URL 中的 'url' 参数
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('url');

        // 2. 如果存在目标链接，则自动跳转
        if (targetUrl) {
            // 使用 replace 方法跳转，不会在浏览器历史记录中留下当前中转页的记录
            window.location.replace(targetUrl); 
            
            // 同时更新手动点击的链接，作为兜底方案
            document.getElementById('manualLink').href = targetUrl;
        } else {
            document.body.innerHTML = '<p>错误：未找到有效的跳转链接。</p>';
        }
    </script>
</body>
</html>
